name: Deploy DB DACPAC to Dev

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - db/dacpac/**
      - .github/workflows/deploy-db-dev.yml

jobs:
  lint-sql:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install SQLFluff
        run: |
          python -m pip install --upgrade pip
          pip install sqlfluff

      - name: Lint SQL files
        run: |
          sqlfluff lint db/dacpac/src --config .sqlfluff

  build-dacpac:
    runs-on: ubuntu-latest
    needs: lint-sql

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build DACPAC
        run: |
          dotnet restore db/dacpac/DataWarehouse.sqlproj
          dotnet build db/dacpac/DataWarehouse.sqlproj -c Release -o ./dacpac_out

      - name: Upload DACPAC Artifact
        uses: actions/upload-artifact@v5
        with:
          name: dw-dacpac
          path: dacpac_out/*.dacpac

  deploy-dev:
    runs-on: windows-latest
    needs: build-dacpac
    environment: dev

    steps:
      - name: Download DACPAC Artifact
        uses: actions/download-artifact@v5
        with:
          name: dw-dacpac
          path: ./dacpac

      - name: Publish DACPAC to Dev
        uses: azure/sql-action@v2.3
        env:
          CONNECTION_STRING: Server=tcp:${{ secrets.DB_SERVER }},1433;Initial Catalog=${{ secrets.DEV_DB_NAME }};Persist Security Info=False;User ID=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
        with:
          connection-string: ${{ env.CONNECTION_STRING }}
          path: ./dacpac/DataWarehouse.dacpac
          action: publish
          arguments: >-
            /p:BlockOnPossibleDataLoss=true
            /p:DropObjectsNotInSource=true
