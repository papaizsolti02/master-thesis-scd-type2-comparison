name: Deploy DB DACPAC to Prod

on:
  pull_request:
    branches: [ main ]

jobs:
  detect-db-changes:
    runs-on: ubuntu-latest
    outputs:
      db_changed: ${{ steps.filter.outputs.db_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect DB object changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            db_changed:
              - 'db/dacpac/**'

  lint-sql:
    runs-on: ubuntu-latest
    needs: detect-db-changes
    if: needs.detect-db-changes.outputs.db_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SQLFluff
        run: |
          python -m pip install --upgrade pip
          pip install sqlfluff==3.4.0

      - name: Lint SQL files
        run: |
          sqlfluff lint db/dacpac/src --config .sqlfluff

  build-dacpac:
    runs-on: ubuntu-latest
    needs: [detect-db-changes, lint-sql]
    if: needs.lint-sql.result == 'success' && needs.detect-db-changes.outputs.db_changed == 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build DACPAC
        run: |
          dotnet restore db/dacpac/DataWarehouse.sqlproj
          dotnet build db/dacpac/DataWarehouse.sqlproj -c Release -o ./dacpac_out

      - name: Upload DACPAC Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dw-dacpac
          path: dacpac_out/*.dacpac

  deploy-prod:
    runs-on: windows-latest
    needs: [detect-db-changes, lint-sql, build-dacpac]
    if: always()
    environment: prod

    steps:
      - name: Validate prerequisites when prod deploy is expected
        if: needs.detect-db-changes.outputs.db_changed == 'true' && github.head_ref == 'develop'
        shell: pwsh
        run: |
          if ("${{ needs.lint-sql.result }}" -ne "success" -or "${{ needs.build-dacpac.result }}" -ne "success") {
            throw "DB changes detected for develop->main but lint/build did not succeed."
          }

      - name: Download DACPAC Artifact
        if: needs.detect-db-changes.outputs.db_changed == 'true' && github.head_ref == 'develop'
        uses: actions/download-artifact@v4
        with:
          name: dw-dacpac
          path: ./dacpac

      - name: Publish DACPAC to Prod
        if: needs.detect-db-changes.outputs.db_changed == 'true' && github.head_ref == 'develop'
        uses: azure/sql-action@v2.3
        env:
          CONNECTION_STRING: Server=tcp:${{ secrets.DB_SERVER }},1433;Initial Catalog=${{ secrets.PROD_DB_NAME }};Persist Security Info=False;User ID=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
        with:
          connection-string: ${{ env.CONNECTION_STRING }}
          path: ./dacpac/DataWarehouse.dacpac
          action: publish
          arguments: >-
            /p:BlockOnPossibleDataLoss=false
            /p:DropObjectsNotInSource=true

      - name: Skip prod deployment
        if: needs.detect-db-changes.outputs.db_changed != 'true' || github.head_ref != 'develop'
        run: echo "Prod deploy not required for this PR."