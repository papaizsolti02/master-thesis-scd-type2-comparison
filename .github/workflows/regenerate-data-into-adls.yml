name: Regenerate Data Into ADLS

on:
  workflow_dispatch:

env:
  ADLS_FILE_SYSTEM: master-thesis
  ADLS_TARGET_DIRECTORY: data

jobs:
  clean-adls:
    name: Clean ADLS filesystem
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ADLS SDK
        run: |
          python -m pip install --upgrade pip
          pip install azure-storage-file-datalake

      - name: Delete filesystem if exists
        run: python src/adls/clean_filesystem.py
        env:
          DATALAKE_CONNECTION_STRING: ${{ secrets.DATALAKE_CONNECTION_STRING }}
          DATALAKE_FILE_SYSTEM: ${{ env.ADLS_FILE_SYSTEM }}

  prepare-adls-directory:
    name: Prepare ADLS data directory
    runs-on: ubuntu-latest
    needs: clean-adls
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: python src/adls/prepare_directory.py
        env:
          DATALAKE_CONNECTION_STRING: ${{ secrets.DATALAKE_CONNECTION_STRING }}
          DATALAKE_FILE_SYSTEM: ${{ env.ADLS_FILE_SYSTEM }}
          DATALAKE_DIRECTORY: ${{ env.ADLS_TARGET_DIRECTORY }}

  generate-and-upload:
    name: Generate and upload snapshots
    runs-on: ubuntu-latest
    needs: prepare-adls-directory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and upload
        run: python -m src.data_generator
        env:
          DATALAKE_CONNECTION_STRING: ${{ secrets.DATALAKE_CONNECTION_STRING }}
          DATALAKE_KEY: ${{ secrets.DATALAKE_KEY }}
          DATALAKE_FILE_SYSTEM: ${{ env.ADLS_FILE_SYSTEM }}
          DATALAKE_DIRECTORY: ${{ env.ADLS_TARGET_DIRECTORY }}
